<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #60716e;
      --line: #d8e0dc;
      --paper: #ffffff;
      --soft: #f6f8f7;
      --accent: #006d75;
      --done: #34a853;
      --doing: #fbbc04;
      --queue: #1a73e8;
      --someday: #9aa0a6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: transparent;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 10px;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
    }
    button {
      min-height: 34px;
      border: 1px solid var(--accent);
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 12px;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(190px, 1fr));
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .col {
      min-width: 190px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      padding: 10px;
    }
    .col[data-section="Doing"] { border-top: 4px solid var(--doing); }
    .col[data-section="Queue"] { border-top: 4px solid var(--queue); }
    .col[data-section="Done"] { border-top: 4px solid var(--done); }
    .col[data-section="Someday / Maybe"] { border-top: 4px solid var(--someday); }
    .col h3 {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.25;
    }
    .dropzone {
      min-height: 112px;
      display: grid;
      align-content: start;
      gap: 8px;
    }
    .dropzone.drag-over {
      outline: 2px dashed rgba(0, 109, 117, 0.45);
      outline-offset: 4px;
      border-radius: 6px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      padding: 9px 10px;
      cursor: grab;
      box-shadow: 0 1px 2px rgba(23, 33, 31, 0.04);
    }
    .card:active { cursor: grabbing; }
    .card.dragging { opacity: 0.42; }
    .title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.28;
      overflow-wrap: anywhere;
    }
    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .badge {
      display: inline-flex;
      margin-top: 6px;
      color: var(--done);
      font-size: 11px;
      font-weight: 700;
    }
    @media (max-width: 760px) {
      .board { grid-template-columns: repeat(4, minmax(210px, 76vw)); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const READY = "streamlit:componentReady";
    const SET_VALUE = "streamlit:setComponentValue";
    const SET_HEIGHT = "streamlit:setFrameHeight";
    const RENDER = "streamlit:render";
    let board = { sections: [], height: 430 };
    let dirty = false;
    let draggingId = "";
    let applySequence = 0;

    function send(type, data) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type,
        ...data,
      }, "*");
    }

    function setHeight() {
      const minHeight = Number(board.height || 430);
      const realHeight = Math.max(minHeight, document.body.scrollHeight + 8);
      send(SET_HEIGHT, { height: realHeight });
    }

    function componentValue(applied) {
      const columns = Array.from(document.querySelectorAll(".col")).map((col) => ({
        section: col.dataset.section,
        task_ids: Array.from(col.querySelectorAll(".card")).map((card) => card.dataset.taskId),
      }));
      return { columns, dirty: Boolean(applied), applied: Boolean(applied) };
    }

    function emitValue() {
      const value = componentValue(true);
      value.apply_id = `${Date.now()}-${++applySequence}`;
      dirty = false;
      send(SET_VALUE, {
        dataType: "json",
        value,
      });
      render();
    }

    function escapeText(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function cardHtml(task) {
      return `
        <article class="card" draggable="true" data-task-id="${escapeText(task.id)}">
          <div class="title">${escapeText(task.title || "Untitled")}</div>
          ${task.subtitle ? `<div class="subtitle">${escapeText(task.subtitle)}</div>` : ""}
          ${task.crystallized ? `<span class="badge">crystallized</span>` : ""}
        </article>
      `;
    }

    function render() {
      const root = document.getElementById("root");
      root.innerHTML = `
        <div class="toolbar">
          <div class="hint">Drag cards between columns, then apply the order.</div>
          <button id="apply" ${dirty ? "" : "disabled"}>Apply order</button>
        </div>
        <main class="board">
          ${(board.sections || []).map((col) => `
            <section class="col" data-section="${escapeText(col.key)}">
              <h3>${escapeText(col.label)} · ${(col.tasks || []).length}</h3>
              <div class="dropzone">
                ${(col.tasks || []).map(cardHtml).join("")}
              </div>
            </section>
          `).join("")}
        </main>
      `;
      wire();
      setHeight();
    }

    function taskIndexAfter(zone, y) {
      const cards = [...zone.querySelectorAll(".card:not(.dragging)")];
      let closest = { offset: Number.NEGATIVE_INFINITY, element: null };
      for (const card of cards) {
        const box = card.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          closest = { offset, element: card };
        }
      }
      return closest.element;
    }

    function wire() {
      document.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("dragstart", (event) => {
          draggingId = card.dataset.taskId;
          card.classList.add("dragging");
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", draggingId);
        });
        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          draggingId = "";
          setHeight();
        });
      });
      document.querySelectorAll(".dropzone").forEach((zone) => {
        zone.addEventListener("dragover", (event) => {
          event.preventDefault();
          const dragged = document.querySelector(`.card[data-task-id="${CSS.escape(draggingId)}"]`);
          if (!dragged) return;
          const before = taskIndexAfter(zone, event.clientY);
          zone.classList.add("drag-over");
          if (before == null) {
            zone.appendChild(dragged);
          } else {
            zone.insertBefore(dragged, before);
          }
          dirty = true;
          const apply = document.getElementById("apply");
          if (apply) apply.disabled = false;
        });
        zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
        zone.addEventListener("drop", (event) => {
          event.preventDefault();
          zone.classList.remove("drag-over");
        });
      });
      const apply = document.getElementById("apply");
      if (apply) {
        apply.addEventListener("click", emitValue);
      }
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type !== RENDER) return;
      board = data.args && data.args.board ? data.args.board : board;
      dirty = false;
      render();
    });

    send(READY, { apiVersion: 1 });
    setHeight();
  </script>
</body>
</html>
