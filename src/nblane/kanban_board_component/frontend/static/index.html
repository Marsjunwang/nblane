<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #60716e;
      --line: #d8e0dc;
      --paper: #ffffff;
      --soft: #f6f8f7;
      --soft-strong: #edf3f0;
      --accent: #21685b;
      --accent-strong: #174d43;
      --accent-soft: #e3f2ee;
      --warn: #8a5b12;
      --danger: #9f1d1d;
      --info: #295b82;
      --shadow: 0 10px 28px rgba(23, 33, 31, .08);
    }
    * { box-sizing: border-box; }
    html, body, #root {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: transparent;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button, input, textarea, select { font: inherit; letter-spacing: 0; }
    button { cursor: pointer; }
    .kb-shell { display: grid; gap: 12px; padding: 2px 0 16px; }
    .kb-topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 2px 10px rgba(23, 33, 31, .05);
    }
    .kb-quick { display: grid; grid-template-columns: minmax(150px, 1fr) minmax(140px, 190px) 38px; gap: 8px; }
    .kb-quick input, .kb-quick select, .kb-field input, .kb-field textarea {
      width: 100%;
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: 0;
      background: var(--paper);
      color: var(--ink);
    }
    .kb-quick input:focus, .kb-quick select:focus, .kb-field input:focus, .kb-field textarea:focus {
      border-color: rgba(33, 104, 91, .65);
      box-shadow: 0 0 0 3px rgba(33, 104, 91, .11);
    }
    .kb-button, .kb-icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      font-size: .86rem;
      font-weight: 750;
      line-height: 1;
      white-space: nowrap;
    }
    .kb-button.primary, .kb-icon-button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .kb-button:hover, .kb-icon-button:hover { border-color: rgba(33, 104, 91, .55); background: var(--accent-soft); }
    .kb-button.primary:hover, .kb-icon-button.primary:hover { background: var(--accent-strong); }
    .kb-icon-button { width: 38px; padding: 0; font-size: 1.15rem; }
    .kb-status { color: var(--muted); font-size: .84rem; }
    .kb-workspace { display: grid; gap: 12px; align-items: start; }
    .kb-board {
      display: grid;
      grid-template-columns: repeat(4, minmax(210px, 1fr));
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .kb-column {
      min-width: 210px;
      min-height: 540px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }
    .kb-column.is-over { outline: 2px dashed rgba(33, 104, 91, .45); outline-offset: -5px; }
    .kb-column-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 28px; }
    .kb-column-head strong { min-width: 0; overflow: hidden; font-size: .92rem; font-weight: 850; text-overflow: ellipsis; white-space: nowrap; }
    .kb-count, .kb-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      color: var(--muted);
      font-size: .74rem;
      font-weight: 780;
      line-height: 1;
    }
    .kb-card-list { display: grid; align-content: start; gap: 8px; min-height: 420px; }
    .kb-card {
      display: grid;
      gap: 7px;
      width: 100%;
      min-height: 92px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      text-align: left;
      box-shadow: 0 1px 2px rgba(23, 33, 31, .04);
      cursor: grab;
    }
    .kb-card:active { cursor: grabbing; }
    .kb-card.is-selected { border-color: rgba(33, 104, 91, .75); box-shadow: 0 0 0 3px rgba(33, 104, 91, .12); }
    .kb-card.is-editing { cursor: default; }
    .kb-card.is-crystallized { background: #f2f7f5; }
    .kb-card-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      min-height: 30px;
    }
    .kb-card-title { overflow-wrap: anywhere; font-size: .9rem; font-weight: 820; line-height: 1.25; }
    .kb-title-input {
      width: 100%;
      min-height: 32px;
      padding: 5px 7px;
      border: 1px solid rgba(33, 104, 91, .45);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      font-size: .9rem;
      font-weight: 820;
      line-height: 1.2;
    }
    .kb-head-actions, .kb-quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
      align-items: center;
    }
    .kb-head-button, .kb-action-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--muted);
      font-size: .72rem;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }
    .kb-head-button { min-width: 28px; padding: 0 7px; }
    .kb-action-chip { padding: 0 7px; }
    .kb-head-button:hover, .kb-action-chip:hover {
      border-color: rgba(33, 104, 91, .55);
      background: var(--accent-soft);
      color: var(--accent-strong);
    }
    .kb-head-button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .kb-head-button.danger {
      border-color: rgba(159, 29, 29, .35);
      color: var(--danger);
    }
    .kb-head-button.danger:hover {
      border-color: rgba(159, 29, 29, .65);
      background: #fff0f0;
    }
    .kb-quick-actions { justify-content: flex-start; min-height: 28px; }
    .kb-card-context { color: var(--muted); display: -webkit-box; overflow: hidden; font-size: .78rem; line-height: 1.35; -webkit-box-orient: vertical; -webkit-line-clamp: 3; }
    .kb-card-meta, .kb-chips, .kb-actions { display: flex; flex-wrap: wrap; gap: 6px; }
    .kb-read-body { display: grid; gap: 5px; }
    .kb-read-extra { display: grid; gap: 8px; }
    .kb-read-line {
      color: var(--muted);
      display: -webkit-box;
      overflow: hidden;
      font-size: .78rem;
      line-height: 1.35;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow-wrap: anywhere;
    }
    .kb-read-line strong { color: var(--ink); font-weight: 780; }
    .kb-read-subtasks { display: grid; gap: 5px; margin-top: 1px; }
    .kb-check-row.is-compact { font-size: .78rem; min-height: 22px; }
    .kb-check-row.is-compact input { height: 15px; width: 15px; }
    .kb-empty { color: var(--muted); font-size: .84rem; padding: 10px 2px; }
    .kb-detail {
      display: grid;
      gap: 10px;
      margin-top: 4px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      cursor: default;
    }
    .kb-detail-empty {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }
    .kb-detail-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 34px; }
    .kb-detail-head strong { font-size: .94rem; font-weight: 850; }
    .kb-field { display: grid; gap: 6px; }
    .kb-field span, .kb-section-title { color: var(--muted); font-size: .74rem; font-weight: 800; text-transform: uppercase; }
    .kb-field textarea { min-height: 64px; resize: vertical; line-height: 1.4; }
    .kb-grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .kb-subtasks { display: grid; gap: 7px; }
    .kb-check-row { display: grid; grid-template-columns: 18px minmax(0, 1fr); gap: 8px; align-items: start; min-height: 26px; color: var(--ink); font-size: .84rem; line-height: 1.35; overflow-wrap: anywhere; }
    .kb-check-row input { width: 16px; height: 16px; margin: 1px 0 0; accent-color: var(--accent); }
    .kb-new-subtask { display: grid; grid-template-columns: minmax(0, 1fr) 38px; gap: 7px; }
    .kb-subtask-edit-row { display: grid; grid-template-columns: 18px minmax(0, 1fr) 32px; gap: 7px; align-items: center; }
    .kb-subtask-edit-row input[type="checkbox"] { width: 16px; height: 16px; margin: 0; accent-color: var(--accent); }
    .kb-subtask-edit-row input[type="text"] {
      min-height: 32px;
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
    }
    .kb-delete-mini {
      width: 32px;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--danger);
      font-weight: 850;
    }
    .kb-proposals { display: grid; gap: 7px; padding: 9px; border: 1px solid var(--line); border-radius: 8px; background: var(--soft); }
    .kb-proposal-row { display: grid; grid-template-columns: 18px minmax(0, 1fr) 32px; gap: 8px; align-items: start; min-height: 34px; }
    .kb-proposal-body { display: grid; gap: 5px; min-width: 0; }
    .kb-proposal-row input[type="checkbox"] { width: 16px; height: 16px; margin: 0; accent-color: var(--accent); }
    .kb-proposal-row input[type="text"] {
      width: 100%;
      min-height: 32px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
    }
    .kb-proposal-meta { color: var(--muted); font-size: .76rem; line-height: 1.35; overflow-wrap: anywhere; }
    .kb-chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      max-width: 100%;
      padding: 4px 9px;
      border: 1px solid #c6dad3;
      border-radius: 999px;
      background: #eef7f4;
      color: #174d43;
      font-size: .76rem;
      font-weight: 750;
      line-height: 1.15;
      overflow-wrap: anywhere;
      text-decoration: none;
    }
    .kb-chip.warn { border-color: #ead5ab; background: #fff7e8; color: var(--warn); }
    .kb-chip.action { cursor: pointer; }
    .kb-alignment { display: grid; gap: 8px; padding: 9px; border: 1px solid #d8d0e8; border-radius: 8px; background: #f6f3fb; }
    .kb-alignment-row { display: grid; grid-template-columns: 18px minmax(0, 1fr); gap: 8px; align-items: start; }
    .kb-alignment-row input[type="radio"],
    .kb-alignment-row input[type="checkbox"] { width: 16px; height: 16px; margin: 2px 0 0; accent-color: var(--accent); }
    .kb-alignment-row strong { display: block; font-size: .82rem; line-height: 1.25; }
    .kb-alignment-body { display: grid; gap: 6px; min-width: 0; }
    .kb-alignment-grid { display: grid; grid-template-columns: minmax(0, 1fr); gap: 6px; }
    .kb-alignment input[type="text"],
    .kb-alignment select,
    .kb-alignment textarea {
      min-height: 58px;
      width: 100%;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      resize: vertical;
    }
    .kb-alignment input[type="text"],
    .kb-alignment select { min-height: 32px; resize: none; }
    .kb-gap { display: grid; gap: 6px; padding: 9px; border: 1px solid #c8d7e3; border-radius: 8px; background: #f1f6fa; }
    .kb-gap .kb-section-title { color: var(--info); }
    .kb-alert { padding: 9px 10px; border-radius: 8px; background: var(--soft); color: var(--muted); font-size: .84rem; line-height: 1.4; }
    .kb-uncrystallized { display: grid; gap: 8px; padding: 10px 12px; border: 1px solid #ead5ab; border-radius: 8px; background: #fff9ed; }
    .kb-focus-layout { display: grid; grid-template-columns: minmax(360px, 1.8fr) minmax(280px, .9fr); gap: 12px; align-items: start; }
    .kb-focus-main .kb-column { min-height: 620px; }
    .kb-focus-side { display: grid; gap: 8px; min-width: 0; }
    .kb-focus-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
    .kb-tab {
      min-height: 32px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      color: var(--muted);
      font-size: .8rem;
      font-weight: 780;
    }
    .kb-tab.is-active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-strong); }
    .kb-focus-side .kb-column { min-height: 460px; }
    @media (max-width: 760px) {
      .kb-topbar { grid-template-columns: 1fr; }
      .kb-quick { grid-template-columns: 1fr; }
      .kb-icon-button { width: 100%; }
      .kb-board { grid-template-columns: repeat(4, minmax(230px, 82vw)); }
      .kb-focus-layout { grid-template-columns: 1fr; }
      .kb-grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const READY = "streamlit:componentReady";
    const SET_VALUE = "streamlit:setComponentValue";
    const SET_HEIGHT = "streamlit:setFrameHeight";
    const RENDER = "streamlit:render";
    const DEFAULT_ORDER = ["Doing", "Queue", "Done", "Someday / Maybe"];
    const DEFAULT_LABELS = {
      add: "Add",
      ai_done: "Done -> evidence",
      ai_done_short: "Evd",
      ai_gap: "Analyze gap",
      ai_gap_short: "Gap",
      ai_subtasks: "Draft subtasks",
      ai_subtasks_short: "Sub",
      alignment_cancel: "Cancel",
      alignment_assumptions: "Assumptions",
      alignment_confirm: "Use this understanding",
      alignment_custom: "Add detail or correction",
      alignment_custom_only: "Use only my supplement",
      alignment_goal: "Goal",
      alignment_label: "Label",
      alignment_other: "Other",
      alignment_other_hint: "Use only my note below",
      alignment_required: "Choose an understanding or add a clarification.",
      alignment_status: "Understanding ready",
      alignment_style: "Subtask style",
      alignment_title: "Confirm task understanding",
      artifact: "Artifact",
      blocked_by: "Blocked by",
      cancel: "Cancel",
      cancel_short: "Cancel",
      completed_on: "Completed",
      crystallize: "Mark crystallized",
      crystallize_short: "Cry",
      crystallized: "Crystallized",
      delete_confirm: "Delete this task?",
      delete_short: "x",
      discard_all_drafts: "Discard all",
      discard_draft: "Discard draft",
      delete_subtask: "Delete subtask",
      delete_task: "Delete task",
      details: "Details",
      done_uncrystallized: "Done, not crystallized",
      edit: "Edit",
      edit_short: "Edit",
      empty: "No tasks",
      error: "Error",
      gap_missing: "Gaps remain",
      gap_next: "Next steps",
      gap_ok: "Can solve",
      gap_preview: "Task gap preview",
      links: "Links",
      new_subtask: "New subtask",
      no_selected_drafts: "Select at least one draft to apply.",
      outcome: "Outcome",
      proposals: "AI proposals",
      apply_subtasks: "Apply selected",
      draft_status: "{count} drafts",
      granularity: "Granularity",
      granularity_checklist: "Checklist",
      granularity_implementation: "Implementation",
      granularity_milestone: "Milestone",
      ai_error_status: "AI error",
      quick_add: "Quick add",
      save: "Save",
      save_short: "Save",
      section: "Section",
      started_on: "Started",
      subtasks: "Subtasks",
      title: "Title",
      untitled: "Untitled",
      verification: "Verification",
      why: "Why",
      context: "Context",
    };
    let args = {};
    let board = [];
    let selectedId = "";
    let editingId = "";
    let focusSection = "";
    let quickSection = "";
    let clickTimer = 0;
    let eventSeq = 0;

    function send(type, data) {
      window.parent.postMessage({ isStreamlitMessage: true, type, ...data }, "*");
    }
    function setHeight() {
      const requested = Number(args.height || 760);
      const real = Math.max(420, document.body.scrollHeight + 12, requested);
      send(SET_HEIGHT, { height: real });
    }
    function asObj(value) {
      return value && typeof value === "object" && !Array.isArray(value) ? value : {};
    }
    function asArr(value) {
      return Array.isArray(value) ? value : [];
    }
    function text(value) {
      return value == null ? "" : String(value);
    }
    function esc(value) {
      return text(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
    function attr(value) {
      return esc(value).replaceAll("'", "&#39;");
    }
    function label(key, fallback) {
      const labels = asObj(args.labels || asObj(args.payload).labels);
      return text(labels[key] || DEFAULT_LABELS[key] || fallback || key);
    }
    function labelsForSections() {
      return asObj(args.labels || asObj(args.payload).labels);
    }
    function settings() {
      return asObj(args.settings || asObj(args.payload).settings);
    }
    function aiState() {
      return asObj(args.ai_state || asObj(args.payload).ai_state);
    }
    function focusMode() {
      return Boolean(settings().focus_mode);
    }
    function sectionOrder(rawSections) {
      const configured = asArr(settings().section_order || settings().sections)
        .map(text)
        .filter(Boolean);
      if (configured.length) return configured;
      if (rawSections && !Array.isArray(rawSections)) {
        const keys = Object.keys(rawSections);
        const ordered = DEFAULT_ORDER.filter((key) => keys.includes(key));
        keys.forEach((key) => { if (!ordered.includes(key)) ordered.push(key); });
        return ordered.length ? ordered : DEFAULT_ORDER;
      }
      return DEFAULT_ORDER;
    }
    function normalizeLinks(raw) {
      return asArr(raw).map((item, index) => {
        if (typeof item === "string") {
          return { id: `link-${index}`, label: item, url: item };
        }
        const obj = asObj(item);
        const url = text(obj.url || obj.href || obj.path || "");
        return { id: text(obj.id || obj.key || url || `link-${index}`), label: text(obj.label || obj.title || url), url };
      }).filter((item) => item.url);
    }
    function normalizeSubtasks(raw) {
      return asArr(raw).map((item, index) => {
        if (typeof item === "string") {
          return { id: `subtask-${index}`, index, title: item, done: false };
        }
        const obj = asObj(item);
        return {
          ...obj,
          id: text(obj.id || obj.key || `subtask-${index}`),
          index: Number.isInteger(obj.index) ? obj.index : index,
          title: text(obj.title || obj.text || ""),
          done: Boolean(obj.done || obj.checked || obj.completed),
        };
      });
    }
    function normalizeProposals(taskId) {
      const byTask = asObj(aiState().proposals_by_task);
      return asArr(byTask[taskId]).map((item, index) => {
        if (typeof item === "string") {
          return { id: `proposal-${index}`, title: item };
        }
        const obj = asObj(item);
        return {
          id: text(obj.id || obj.key || `proposal-${index}`),
          title: text(obj.title || obj.text || obj.name || ""),
          reason: text(obj.reason || ""),
          gap_node_id: text(obj.gap_node_id || obj.node_id || ""),
          artifact: text(obj.artifact || obj.deliverable || obj.output || ""),
          verification: text(obj.verification || obj.verify || obj.evidence || obj.validation || ""),
        };
      }).filter((item) => item.title);
    }
    function normalizeSubtaskError(taskId) {
      return asObj(asObj(aiState().subtask_errors_by_task)[taskId]);
    }
    function normalizeGap(taskId) {
      return asObj(asObj(aiState().gaps_by_task)[taskId]);
    }
    function normalizeAlignments(taskId) {
      const byTask = asObj(aiState().alignment_by_task);
      return asArr(byTask[taskId]).map((item, index) => {
        const obj = asObj(item);
        const assumptions = asArr(obj.assumptions).map(text).filter(Boolean);
        return {
          id: text(obj.id || obj.key || `alignment-${index}`),
          label: text(obj.label || obj.title || `Option ${index + 1}`),
          goal: text(obj.goal || obj.understanding || ""),
          assumptions,
          subtask_style: text(obj.subtask_style || obj.style || ""),
        };
      }).filter((item) => item.label || item.goal);
    }
    function normalizeTask(task, section, index) {
      const obj = asObj(task);
      const id = text(obj.id || obj.task_id || obj.key || `${section}-${index}`);
      const details = asArr(obj.details).length ? asArr(obj.details).map(text).join("\n") : text(obj.notes || "");
      return {
        ...obj,
        id,
        section,
        title: text(obj.title || obj.name || label("untitled")),
        context: text(obj.context || obj.description || ""),
        why: text(obj.why || ""),
        blocked_by: text(obj.blocked_by || obj.blockedBy || ""),
        outcome: text(obj.outcome || ""),
        started_on: text(obj.started_on || obj.startedOn || ""),
        completed_on: text(obj.completed_on || obj.completedOn || ""),
        notes: details,
        details: details ? details.split(/\n+/).map((x) => x.trim()).filter(Boolean) : [],
        crystallized: Boolean(obj.crystallized),
        subtasks: normalizeSubtasks(obj.subtasks),
        links: normalizeLinks(obj.links),
      };
    }
    function normalizeBoard() {
      const payload = asObj(args.payload);
      const rawSections = args.sections !== undefined ? args.sections : payload.sections;
      const labels = labelsForSections();
      if (Array.isArray(rawSections)) {

          }
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", card.dataset.taskId);
        });
      });
      document.querySelectorAll(".kb-column").forEach((column) => {
        column.addEventListener("dragover", (event) => {
          event.preventDefault();
          column.classList.add("is-over");
        });
        column.addEventListener("dragleave", () => column.classList.remove("is-over"));
        column.addEventListener("drop", (event) => {
          event.preventDefault();
          column.classList.remove("is-over");
          moveTask(event.dataTransfer.getData("text/plain"), column.dataset.section);
        });
      });
      document.querySelectorAll("[data-crystallize-id]").forEach((button) => {
        button.addEventListener("click", () => emit("crystallize_card", { card_id: button.dataset.crystallizeId }));
      });
      document.querySelectorAll("[data-subtask-task] [data-subtask-index]").forEach((box) => {
        box.addEventListener("change", () => {
          const wrap = box.closest("[data-subtask-task]");
          const taskId = wrap ? wrap.dataset.subtaskTask : "";
          if (!taskId) return;
          emit("edit_card", {
            card_id: taskId,
            card: collectReadCard(box.closest(".kb-card")),
          });
        });
      });
      document.querySelectorAll("[data-selected-task]").forEach((panel) => {
        const taskId = panel.dataset.selectedTask;
        panel.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => {
            const action = button.dataset.action;
            if (action === "save") {
              const card = collectEditCard(panel);
              editingId = "";
              emit("edit_card", { card_id: taskId, card });
            } else if (action === "edit") {
              selectedId = taskId;
              editingId = taskId;
              render();
            } else if (action === "cancel_edit") {
              editingId = "";
              render();
            } else if (action === "add_subtask") {
              const input = panel.querySelector("[data-new-subtask]");
              const title = input ? input.value.trim() : "";
              if (title) {
                const card = collectEditCard(panel, { title, done: false });
                editingId = taskId;
                emit("edit_card", { card_id: taskId, card });
              }
            } else if (action === "delete_subtask") {
              const row = button.closest("[data-subtask-row]");
              const card = collectEditCard(panel, null, row);
              editingId = taskId;
              emit("edit_card", { card_id: taskId, card });
            } else if (action === "discard_subtask_draft") {
              const index = Number(button.dataset.proposalIndex);
              emit("discard_subtask_draft", { card_id: taskId, index });
            } else if (action === "discard_subtask_drafts") {
              emit("discard_subtask_drafts", { card_id: taskId });
            } else if (action === "apply_subtasks") {
              const drafts = Array.from(panel.querySelectorAll("[data-proposal-title]"))
                .map((input) => {
                  const index = Number(input.dataset.proposalTitle);
                  const check = panel.querySelector(`[data-proposal-check="${input.dataset.proposalTitle}"]`);
                  return {
                    index,
                    title: input.value.trim(),
                    selected: !check || check.checked,
                  };
                });
              const titles = drafts
                .filter((draft) => draft.selected && draft.title)
                .map((draft) => draft.title);
              if (!titles.length) {
                window.alert(label("no_selected_drafts"));
                return;
              }
              const cardEl = panel.closest(".kb-card");
              const card = panel.querySelector("[data-field]")
                ? collectEditCard(panel)
                : collectReadCard(cardEl);
              emit("apply_subtasks", { card_id: taskId, drafts, titles, card });
            } else if (action === "confirm_alignment") {
              const selectedAlignments = Array.from(panel.querySelectorAll("[data-alignment-card]"))
                .filter((row) => Boolean(row.querySelector("[data-alignment-index]")?.checked))
                .map((row) => ({
                  label: text(row.querySelector("[data-alignment-label]")?.value || "").trim(),
                  goal: text(row.querySelector("[data-alignment-goal]")?.value || "").trim(),
                  assumptions: text(row.querySelector("[data-alignment-assumptions]")?.value || "")
                    .split(/\n+/)
                    .map((item) => item.trim())
                    .filter(Boolean),
                  subtask_style: text(row.querySelector("[data-alignment-style]")?.value || "").trim(),
                }))
                .filter((item) => item.label || item.goal || item.assumptions.length || item.subtask_style);
              const customOnly = panel.querySelector("[data-alignment-custom-only]");
              const useCustomOnly = Boolean(customOnly && customOnly.checked);
              const custom = panel.querySelector("[data-alignment-custom]");
              const customText = custom ? custom.value.trim() : "";
              if ((useCustomOnly && !customText) || (!useCustomOnly && !selectedAlignments.length && !customText)) {
                window.alert(label("alignment_required"));
                return;
              }
              const granularity = text(panel.querySelector("[data-alignment-granularity]")?.value || "milestone");
              emit("confirm_subtask_alignment", {
                card_id: taskId,
                alignment_mode: useCustomOnly ? "custom_only" : "selected_plus_custom",
                selected_alignments: useCustomOnly ? [] : selectedAlignments,
                custom_context: customText,
                granularity,
              });
            } else if (action === "cancel_alignment") {
              emit("cancel_subtask_alignment", { card_id: taskId });
            } else if (action === "ai_gap") {
              emit("request_gap", { card_id: taskId });
            } else if (action === "ai_subtasks") {
              emit("request_subtasks", { card_id: taskId });
            } else if (action === "ai_done") {
              emit("request_done_ingest", { card_id: taskId });
            } else if (action === "crystallize") {
              emit("crystallize_card", { card_id: taskId });
            } else if (action === "delete") {
              if (!window.confirm(label("delete_confirm"))) return;
              editingId = "";
              emit("delete_task", { card_id: taskId });
            }
          });
        });
      });
    }
    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type !== RENDER) return;
      args = data.args || {};
      board = normalizeBoard();
      selectedId = text(asObj(args.ui || asObj(args.payload).ui).selected_card_id || selectedId);
      quickSection = quickSection || board.find((s) => s.key === "Queue")?.key || board[0]?.key || "";
      render();
    });
    send(READY, { apiVersion: 1 });
    setHeight();
  </script>
</body>
</html>
