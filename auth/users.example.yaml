# Copy this file to the private data repository, for example:
# /srv/nblane-data/auth/users.yaml
#
# Generate password hashes with:
#   nblane auth hash-password

schema_version: "1.0"
users:
  admin:
    display_name: Admin
    password_hash: "<pbkdf2_sha256$...>"
    role: admin
    teams: ["*"]

  wang:
    display_name: 王军
    password_hash: "<pbkdf2_sha256$...>"
    role: member
    profile: 王军
    teams: [example-team]
