name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: pytest -q

      - name: Validate profiles
        run: python -m nblane.cli validate

      - name: CLI status smoke
        run: python -m nblane.cli status

      - name: Import smoke
        run: >
          python -c "from nblane.kanban_ui import render_kanban_board;
          from nblane.core.profile_ingest import merge_ingest_patch;
          print('imports ok')"
